services:
  postgres:
    image: ${DOCKER_REGISTRY:-docker.io}/pgvector/pgvector:pg16
    container_name: kb_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  redis:
    image: ${DOCKER_REGISTRY:-docker.io}/library/redis:7.4-alpine
    container_name: kb_redis
    ports:
      - "6379:6379"

  minio:
    image: ${DOCKER_REGISTRY:-docker.io}/minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: kb_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.io}
    container_name: kb_gateway
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/knowledge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8080:8000"
    depends_on:
      - postgres
      - redis

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.io}
    container_name: kb_identity
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/knowledge}
    ports:
      - "8081:8000"
    depends_on:
      - postgres

  knowledge-service:
    build:
      context: .
      dockerfile: services/knowledge-service/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.io}
    container_name: kb_knowledge
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/knowledge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-kbdocs}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-5000000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "8082:8000"
    depends_on:
      - postgres
      - redis
      - minio

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.io}
    container_name: kb_ai
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/knowledge}
      LITELLM_URL: ${LITELLM_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
    ports:
      - "8083:8000"
    depends_on:
      - postgres

  worker-service:
    build:
      context: .
      dockerfile: services/worker-service/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.io}
    container_name: kb_worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/knowledge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-kbdocs}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_MAX_BYTES: ${S3_MAX_BYTES:-5000000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    depends_on:
      - postgres
      - redis
      - minio

  ops-service:
    build:
      context: .
      dockerfile: services/ops-service/Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.io}
    container_name: kb_ops
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/knowledge}
    ports:
      - "8084:8000"
    depends_on:
      - postgres

volumes:
  pg_data:
  minio_data:
