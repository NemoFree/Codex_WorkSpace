name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Ruff check
        run: ruff check backend

      - name: Compile check
        run: python -m compileall backend/services backend/libs

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - identity-service
          - knowledge-service
          - ai-service
          - worker-service
          - ops-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            -f backend/services/${{ matrix.service }}/Dockerfile \
            -t local/${{ matrix.service }}:${{ github.sha }} \
            backend

  publish-release:
    needs: [quality, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Tag is empty" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -n 1 || true)

          {
            echo "## Release $TAG"
            echo
            if [[ -n "$PREV_TAG" ]]; then
              echo "Changes since $PREV_TAG:"
              git log --pretty='- %h %s' "$PREV_TAG..$TAG"
            else
              echo "Initial release changes:"
              git log --pretty='- %h %s' "$TAG"
            fi
          } > release_notes.md

          echo "Generated release_notes.md"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          body_path: release_notes.md
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
